<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Neural Nautic — Atelier</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink-deep); min-height: 100vh; }
  .site-scroll { scroll-behavior: smooth; }
  button { font: inherit; }
  a:hover { border-bottom-color: currentColor; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeaturedCollection.jsx"></script>
  <script type="text/babel" src="AtelierNote.jsx"></script>
  <script type="text/babel" src="JournalList.jsx"></script>
  <script type="text/babel" src="ObjectDetail.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const LS_KEY = 'nn_site_screen';
    const App = () => {
      const [screen, setScreen] = React.useState(() => localStorage.getItem(LS_KEY) || 'home');
      const [selected, setSelected] = React.useState(null);

      React.useEffect(() => { localStorage.setItem(LS_KEY, screen); window.scrollTo(0,0); }, [screen]);

      const onNav = (id) => { setScreen(id); setSelected(null); };
      const openObject = (o) => { setSelected(o); setScreen('detail'); };

      return (
        <div className="site-scroll" data-screen-label={`${screen}`}>
          <Header current={screen} onNav={onNav} />

          {screen === 'home' && (<>
            <Hero onNav={onNav} />
            <FeaturedCollection onOpen={openObject} />
            <AtelierNote />
          </>)}

          {screen === 'collection' && (
            <div style={{paddingTop: 48}}>
              <div style={{maxWidth:1240,margin:'0 auto',padding:'60px 48px 0'}}>
                <Eyebrow>✦  The Collection · MMXXVI</Eyebrow>
                <h1 style={{fontFamily:'Italiana',fontSize:88,lineHeight:1,letterSpacing:'-0.015em',color:'var(--fg-1)',margin:'20px 0 0'}}>An atlas of objects.</h1>
              </div>
              <FeaturedCollection onOpen={openObject} />
            </div>
          )}

          {screen === 'journal' && <JournalList onOpen={openObject} />}

          {screen === 'detail' && <ObjectDetail o={selected} onBack={() => onNav('collection')} />}

          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
