<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 32px;background:#0A2028;min-height:200px}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.item{background:#0E2B36;border:1px solid rgba(205,206,210,.15);border-radius:6px;padding:16px}
.eye{font-family:'Inter';font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:.22em;color:#707078;margin:0 0 10px}
.num{font-family:'Italiana',serif;font-size:44px;line-height:1;color:#F5F5F2;margin:0}
.sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:#3FD4E0;margin:4px 0 0}
.quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:22px;line-height:1.3;color:#F5F5F2;margin:0;padding:0 4px}
.attr{font-family:'Inter';font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:#707078;margin-top:10px}
.sep{width:24px;height:1px;background:#3FD4E0;margin-bottom:10px}
</style></head><body><div class="card">
  <p class="title">Stat + Pull-quote</p>
  <div class="grid">
    <div class="item">
      <p class="eye">Log · Mar 2026</p>
      <div class="sep"></div>
      <p class="num">14,902</p>
      <p class="sub">nautical miles observed</p>
    </div>
    <div class="item">
      <p class="quote">"The mark is struck, not rendered — a quiet gleam caught at dusk."</p>
      <p class="attr">✦ From the atelier journal</p>
    </div>
  </div>
</div></body></html>
