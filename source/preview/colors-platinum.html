<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 24px;background:#0A2028}
.row{gap:0;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-2)}
.sw{flex:1;aspect-ratio:1/0.85;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
.sw .n{font-family:var(--font-sans);font-size:11px;font-weight:500;letter-spacing:.04em}
.sw .h{font-family:var(--font-mono);font-size:9.5px;margin-top:2px;opacity:.8}
.title{font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--fg-1);margin:0 0 4px}
.sub{font-size:11px;color:var(--fg-3);margin:0 0 16px}
</style></head><body><div class="card">
  <p class="title">Platinum</p>
  <p class="sub">Brushed-silver neutrals — type, chrome, fine rules. ~30% of any composition.</p>
  <div class="row">
    <div class="sw" style="background:#707078;color:#F5F5F2"><div class="n">Deep</div><div class="h">#707078</div></div>
    <div class="sw" style="background:#9C9CA4;color:#0A2028"><div class="n">Mid</div><div class="h">#9C9CA4</div></div>
    <div class="sw" style="background:#CDCED2;color:#0A2028"><div class="n">Bright</div><div class="h">#CDCED2</div></div>
    <div class="sw" style="background:#E6E7EA;color:#0A2028"><div class="n">Light</div><div class="h">#E6E7EA</div></div>
    <div class="sw" style="background:#F5F5F2;color:#0A2028"><div class="n">White</div><div class="h">#F5F5F2</div></div>
  </div>
</div></body></html>
