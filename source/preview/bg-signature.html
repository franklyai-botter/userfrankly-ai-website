<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:24px;background:#061419;min-height:240px;position:relative;overflow:hidden}
.bg{position:absolute;inset:0;background:url('../assets/bg-neural-network.png') center/cover}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(6,20,25,.85) 100%)}
.content{position:relative;padding:32px 24px;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.eye{font-family:'Inter';font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.28em;color:#6FEFF5;margin:0 0 14px}
.h{font-family:'Italiana',serif;font-size:48px;line-height:1.02;color:#F5F5F2;margin:0 0 10px;letter-spacing:-0.01em}
.sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#E6E7EA;max-width:44ch;margin:0}
</style></head><body><div class="card">
  <div class="bg"></div><div class="vignette"></div>
  <div class="content">
    <p class="eye">✦  Signature Background</p>
    <p class="h">A luminous mesh.</p>
    <p class="sub">Always with a radial vignette. The image is never loud — it is the deep behind the thought.</p>
  </div>
</div></body></html>
