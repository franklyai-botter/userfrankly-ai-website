<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:32px;background:#0A2028}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 22px}
.row{display:flex;gap:24px;align-items:flex-end;justify-content:space-around}
.item{display:flex;flex-direction:column;align-items:center;gap:14px;flex:1}
.box{width:80px;height:80px;background:#123844;border:1px solid rgba(205,206,210,.18);border-radius:6px}
.sm{box-shadow:0 1px 2px rgba(0,0,0,.25)}
.md{box-shadow:0 4px 16px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.3)}
.lg{box-shadow:0 16px 48px rgba(0,0,0,.45),0 2px 6px rgba(0,0,0,.35)}
.glow{box-shadow:0 0 24px rgba(63,212,224,.35),0 0 6px rgba(63,212,224,.6);border-color:rgba(63,212,224,.5)}
.rim{box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);background:linear-gradient(180deg,#1A4E5E,#0E2B36)}
.tok{font-family:var(--font-mono);font-size:10px;color:#9C9CA4}
.n{font-family:'Inter';font-size:10px;color:#707078;text-align:center;max-width:90px}
</style></head><body><div class="card">
  <p class="title">Elevation · ambient depth + cyan bloom</p>
  <div class="row">
    <div class="item"><div class="box sm"></div><div class="tok">shadow-sm</div><div class="n">hairline lift</div></div>
    <div class="item"><div class="box md"></div><div class="tok">shadow-md</div><div class="n">default card</div></div>
    <div class="item"><div class="box lg"></div><div class="tok">shadow-lg</div><div class="n">modal / hero</div></div>
    <div class="item"><div class="box glow"></div><div class="tok">glow-accent</div><div class="n">focus / active</div></div>
    <div class="item"><div class="box rim"></div><div class="tok">inner-rim</div><div class="n">brushed facet</div></div>
  </div>
</div></body></html>
