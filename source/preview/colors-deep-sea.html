<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 24px}
.row{gap:0;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-2)}
.sw{flex:1;aspect-ratio:1/0.85;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;position:relative}
.sw .n{font-family:var(--font-sans);font-size:11px;font-weight:500;letter-spacing:.04em}
.sw .h{font-family:var(--font-mono);font-size:9.5px;margin-top:2px;opacity:.8}
.title{font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--fg-1);margin:0 0 4px}
.sub{font-size:11px;color:var(--fg-3);margin:0 0 16px;letter-spacing:.02em}
</style></head><body><div class="card">
  <p class="title">Deep Sea</p>
  <p class="sub">Primary canvas — the abyss beneath the mesh. ~60% of any composition.</p>
  <div class="row">
    <div class="sw" style="background:#061419;color:#CDCED2"><div class="n">Abyss</div><div class="h">#061419</div></div>
    <div class="sw" style="background:#0A2028;color:#CDCED2"><div class="n">Deep</div><div class="h">#0A2028</div></div>
    <div class="sw" style="background:#0E2B36;color:#CDCED2"><div class="n">Tide</div><div class="h">#0E2B36</div></div>
    <div class="sw" style="background:#123844;color:#CDCED2"><div class="n">Current</div><div class="h">#123844</div></div>
    <div class="sw" style="background:#1A4E5E;color:#E6E7EA"><div class="n">Shoal</div><div class="h">#1A4E5E</div></div>
  </div>
</div></body></html>
