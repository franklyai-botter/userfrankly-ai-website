<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 32px;background:#0A2028}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 18px}
.row{display:flex;gap:20px;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:62px;height:62px;background:#123844;border:1px solid rgba(205,206,210,.18)}
.r0{border-radius:0}.rh{border-radius:2px}.rs{border-radius:4px}.rm{border-radius:6px}.rl{border-radius:10px}.rxl{border-radius:16px}.rp{border-radius:999px}
.tok{font-family:var(--font-mono);font-size:10px;color:#9C9CA4}
.n{font-family:'Inter';font-size:10px;color:#707078}
</style></head><body><div class="card">
  <p class="title">Corner Radii · tight & precise</p>
  <div class="row">
    <div class="item"><div class="box r0"></div><div class="tok">none</div><div class="n">0</div></div>
    <div class="item"><div class="box rh"></div><div class="tok">hair</div><div class="n">2</div></div>
    <div class="item"><div class="box rs"></div><div class="tok">sm · btn</div><div class="n">4</div></div>
    <div class="item"><div class="box rm"></div><div class="tok">md · card</div><div class="n">6</div></div>
    <div class="item"><div class="box rl"></div><div class="tok">lg</div><div class="n">10</div></div>
    <div class="item"><div class="box rxl"></div><div class="tok">xl</div><div class="n">16</div></div>
    <div class="item"><div class="box rp"></div><div class="tok">pill · tag</div><div class="n">999</div></div>
  </div>
</div></body></html>
