<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:32px;background:#0A2028;min-height:260px}
.eyebrow{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:#3FD4E0;margin:0 0 16px}
.row{display:grid;grid-template-columns:90px 1fr;gap:14px;align-items:baseline;margin-bottom:12px}
.lbl{font-family:var(--font-mono);font-size:10px;color:#707078}
.sp{font-family:'Inter',sans-serif;color:#F5F5F2}
.sp.h4{font-weight:500;font-size:22px;line-height:1.2}
.sp.body{font-weight:400;font-size:16px;line-height:1.5;color:#CDCED2}
.sp.small{font-weight:400;font-size:14px;color:#9C9CA4}
.sp.cap{font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#9C9CA4}
</style></head><body><div class="card">
  <p class="eyebrow">Interface · Inter</p>
  <div class="row"><div class="lbl">h4 · 22/26</div><div class="sp h4">Chart a new bearing</div></div>
  <div class="row"><div class="lbl">body · 16/24</div><div class="sp body">The composer listens, tides out, and returns your message to the log — without ceremony.</div></div>
  <div class="row"><div class="lbl">small · 14/20</div><div class="sp small">Saved to the log · 2 minutes ago</div></div>
  <div class="row"><div class="lbl">label · 11</div><div class="sp cap">Meridian · North-Northeast</div></div>
</div></body></html>
