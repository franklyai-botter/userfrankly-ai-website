<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 32px;background:#0A2028;min-height:200px}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 16px}
.row{display:grid;grid-template-columns:60px 1fr 80px;gap:12px;align-items:center;padding:6px 0}
.tok{font-family:var(--font-mono);font-size:10px;color:#707078}
.bar{height:10px;background:linear-gradient(90deg,#3FD4E0,#6FEFF5);border-radius:2px}
.meta{font-family:var(--font-mono);font-size:10px;color:#9C9CA4;text-align:right}
</style></head><body><div class="card">
  <p class="title">Spacing Scale · base 4</p>
  <div class="row"><div class="tok">sp-1</div><div><div class="bar" style="width:4px"></div></div><div class="meta">4px</div></div>
  <div class="row"><div class="tok">sp-2</div><div><div class="bar" style="width:8px"></div></div><div class="meta">8px</div></div>
  <div class="row"><div class="tok">sp-3</div><div><div class="bar" style="width:12px"></div></div><div class="meta">12px</div></div>
  <div class="row"><div class="tok">sp-4</div><div><div class="bar" style="width:16px"></div></div><div class="meta">16px</div></div>
  <div class="row"><div class="tok">sp-5</div><div><div class="bar" style="width:24px"></div></div><div class="meta">24px</div></div>
  <div class="row"><div class="tok">sp-6</div><div><div class="bar" style="width:32px"></div></div><div class="meta">32px</div></div>
  <div class="row"><div class="tok">sp-7</div><div><div class="bar" style="width:48px"></div></div><div class="meta">48px</div></div>
  <div class="row"><div class="tok">sp-8</div><div><div class="bar" style="width:64px"></div></div><div class="meta">64px</div></div>
  <div class="row"><div class="tok">sp-9</div><div><div class="bar" style="width:96px"></div></div><div class="meta">96px</div></div>
  <div class="row"><div class="tok">sp-10</div><div><div class="bar" style="width:128px"></div></div><div class="meta">128px</div></div>
</div></body></html>
