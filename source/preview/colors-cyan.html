<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 24px;background:#0A2028}
.row{gap:0;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-2)}
.sw{flex:1;aspect-ratio:1/0.85;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;position:relative}
.sw .n{font-family:var(--font-sans);font-size:11px;font-weight:500;letter-spacing:.04em}
.sw .h{font-family:var(--font-mono);font-size:9.5px;margin-top:2px;opacity:.85}
.title{font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--fg-1);margin:0 0 4px}
.sub{font-size:11px;color:var(--fg-3);margin:0 0 16px}
</style></head><body><div class="card">
  <p class="title">Cyan Luminance</p>
  <p class="sub">The glow of synapses. Accent only — ~10% of any composition.</p>
  <div class="row">
    <div class="sw" style="background:#2D8A9A;color:#061419"><div class="n">Faint</div><div class="h">#2D8A9A</div></div>
    <div class="sw" style="background:#3FD4E0;color:#061419"><div class="n">Cyan · accent</div><div class="h">#3FD4E0</div></div>
    <div class="sw" style="background:#6FEFF5;color:#061419"><div class="n">Aqua · hover</div><div class="h">#6FEFF5</div></div>
    <div class="sw" style="background:#B8F5F9;color:#061419"><div class="n">Mist</div><div class="h">#B8F5F9</div></div>
  </div>
</div></body></html>
