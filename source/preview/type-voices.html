<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:32px;background:#0A2028;min-height:220px}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 18px}
.eye{font-family:'Inter';font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:#3FD4E0;margin:0 0 8px}
.pull{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:30px;line-height:1.35;color:#F5F5F2;margin:0 0 14px;max-width:56ch;border-left:1px solid #3FD4E0;padding-left:18px}
.cap{font-family:'Inter';font-size:11px;color:#707078;letter-spacing:.04em}
.mono{font-family:'JetBrains Mono';font-size:12px;color:#6FEFF5;background:#0E2B36;padding:3px 8px;border-radius:3px;border:1px solid rgba(63,212,224,.15)}
</style></head><body><div class="card">
  <p class="eye">Voice Specimens</p>
  <p class="pull">A quiet gleam. A calibrated line. The mark is struck, not rendered.</p>
  <p class="cap">Cormorant italic · eyebrow in Inter uppercase · mono for coordinates <span class="mono">52.3702° N · 4.8952° E</span></p>
</div></body></html>
