<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:32px;background:#0A2028;min-height:180px}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 22px}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{font-family:'Inter';font-size:13px;font-weight:500;letter-spacing:.06em;padding:12px 22px;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all 180ms cubic-bezier(.22,.61,.36,1);display:inline-flex;align-items:center;gap:10px}
.primary{background:#3FD4E0;color:#061419;box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 0 24px rgba(63,212,224,.25)}
.secondary{background:transparent;color:#F5F5F2;border-color:rgba(205,206,210,.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.ghost{background:transparent;color:#3FD4E0;border-color:transparent;padding:12px 14px}
.pill{background:linear-gradient(180deg,#1A4E5E,#0E2B36);color:#F5F5F2;border:1px solid rgba(205,206,210,.2);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.3);border-radius:999px;padding:10px 20px}
.lbl{font-family:var(--font-mono);font-size:10px;color:#707078;margin-top:10px;text-align:center}
.col{display:flex;flex-direction:column;gap:8px}
.arrow{font-family:serif;font-size:14px}
</style></head><body><div class="card">
  <p class="title">Buttons</p>
  <div class="row">
    <div class="col"><button class="btn primary">Cast off <span class="arrow">→</span></button><div class="lbl">primary</div></div>
    <div class="col"><button class="btn secondary">Return to shore</button><div class="lbl">secondary</div></div>
    <div class="col"><button class="btn ghost">Read the log <span class="arrow">→</span></button><div class="lbl">ghost</div></div>
    <div class="col"><button class="btn pill">Brushed pill</button><div class="lbl">brushed · metal</div></div>
  </div>
</div></body></html>
