<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:28px 32px;background:#0A2028;min-height:240px}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#F5F5F2;margin:0 0 18px}
.row{display:grid;grid-template-columns:60px 1fr 120px;gap:16px;align-items:baseline;padding:8px 0;border-bottom:1px solid rgba(205,206,210,0.08)}
.row:last-child{border-bottom:none}
.tok{font-family:var(--font-mono);font-size:10px;color:#707078}
.sample{color:#F5F5F2}
.meta{font-family:var(--font-mono);font-size:10px;color:#707078;text-align:right}
</style></head><body><div class="card">
  <p class="title">Type Scale</p>
  <div class="row"><div class="tok">6xl</div><div class="sample" style="font-family:'Italiana';font-size:52px;line-height:1">Aa</div><div class="meta">128 / display</div></div>
  <div class="row"><div class="tok">4xl</div><div class="sample" style="font-family:'Italiana';font-size:40px;line-height:1">Aa</div><div class="meta">64 / display</div></div>
  <div class="row"><div class="tok">2xl</div><div class="sample" style="font-family:'Cormorant Garamond';font-style:italic;font-size:30px">Aa</div><div class="meta">36 / serif</div></div>
  <div class="row"><div class="tok">lg</div><div class="sample" style="font-family:'Inter';font-weight:500;font-size:20px;color:#CDCED2">Aa</div><div class="meta">22 / sans</div></div>
  <div class="row"><div class="tok">sm</div><div class="sample" style="font-family:'Inter';font-size:14px;color:#9C9CA4">Aa</div><div class="meta">14 / sans</div></div>
</div></body></html>
