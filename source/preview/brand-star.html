<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card{padding:0;background:#F5F2EB;min-height:240px;display:grid;grid-template-columns:1fr 1fr}
.half{padding:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.left{background:#0A2028;position:relative;overflow:hidden}
.left .bg{position:absolute;inset:0;background:url('../assets/bg-neural-network.png') center/cover;opacity:.8}
.left .v{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(6,20,25,.9) 100%)}
.left img{width:140px;position:relative;filter:drop-shadow(0 4px 16px rgba(63,212,224,.4))}
.left .l{position:relative;font-family:'Inter';font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:#6FEFF5;margin-top:14px}
.right img{width:140px;filter:contrast(1.15) brightness(.55) sepia(.25)}
.right .l{font-family:'Inter';font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:#707078;margin-top:14px}
</style></head><body><div class="card">
  <div class="half left"><div class="bg"></div><div class="v"></div><img src="../assets/logo-star.png?v=20" alt=""/><div class="l">On Deep Sea</div></div>
  <div class="half right"><img src="../assets/logo-star.png?v=20" alt=""/><div class="l">On Ivory</div></div>
</div></body></html>
