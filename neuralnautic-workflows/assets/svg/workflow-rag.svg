<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" class="nn-workflow-svg"
     role="img" aria-labelledby="rag-title rag-desc">
  <title id="rag-title">Retrieval-Augmented Generation – Vektorraum-Visualisierung</title>
  <desc id="rag-desc">Frage im Zentrum, relevante Treffer leuchten cyan, irrelevante Punkte im Hintergrund. Unten: Kontextpaket → LLM → Antwort mit Quellen.</desc>

  <defs>
    <marker id="arrow-cyan-r" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00D4D4" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-green-r" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D4D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .nn-node rect { fill: #0D2C2C; stroke: rgba(0,212,212,0.25); stroke-width:1.5; }
    .nn-node--accent rect { fill: #0A2424; stroke: #00D4D4; stroke-width:1.5; stroke-opacity:0.6; }
    .nn-node--out rect { fill: rgba(74,222,128,0.08); stroke: #4ADE80; stroke-width:1.5; }
    .nn-node__title { fill:#E8F4F4; font-family:'Inter',sans-serif; font-size:11.5px; font-weight:500; text-anchor:middle; dominant-baseline:middle; }
    .nn-node__sub { fill:#6B8989; font-family:'Inter',sans-serif; font-size:9.5px; text-anchor:middle; dominant-baseline:middle; }
    .dot-irrelevant { fill:#1A3A3A; stroke:rgba(0,212,212,0.12); stroke-width:1; }
    .dot-hit { fill:#00D4D4; fill-opacity:0.25; stroke:#00D4D4; stroke-width:1.5; }
    .dot-hit--glow { filter: drop-shadow(0 0 5px #00D4D4); }
    .dot-question { fill:rgba(0,212,212,0.3); stroke:#00D4D4; stroke-width:2; }
    .connect-line { stroke:#00D4D4; stroke-width:1.2; stroke-opacity:0.55; fill:none;
      stroke-dasharray:200; animation: draw-r 0.8s ease-out forwards; opacity:0; }
    .connect-line:nth-child(1) { animation-delay:400ms; }
    .connect-line:nth-child(2) { animation-delay:600ms; }
    .connect-line:nth-child(3) { animation-delay:800ms; }
    .connect-line:nth-child(4) { animation-delay:1000ms; }
    .connect-line:nth-child(5) { animation-delay:1200ms; }
    @keyframes draw-r { from { stroke-dashoffset:200; opacity:0; } to { stroke-dashoffset:0; opacity:1; } }
    .dot-appear { opacity:0; animation: pop-r 0.4s ease-out forwards; }
    @keyframes pop-r { 0%{opacity:0;transform:scale(0);} 60%{opacity:1;transform:scale(1.3);} 100%{opacity:1;transform:scale(1);} }
    .nn-node { opacity:0; animation: fade-r 0.6s ease-out forwards; animation-delay:var(--delay,0ms); }
    @keyframes fade-r { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
    .section-label { fill:#4A6868; font-family:'Inter',sans-serif; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; }
    .nn-arrow-r { stroke:#00D4D4; stroke-width:1.5; stroke-opacity:0.7; fill:none; }
    .nn-arrow-r--green { stroke:#4ADE80; stroke-width:1.5; fill:none; }
    @media (prefers-reduced-motion:reduce) {
      .nn-node,.connect-line,.dot-appear { animation:none !important; opacity:1 !important; stroke-dashoffset:0 !important; }
    }
  </style>

  <!-- Section label -->
  <text x="340" y="22" class="section-label" text-anchor="middle">Vektorraum · semantische Nähe</text>

  <!-- Background irrelevant dots (scattered) -->
  <circle cx="110" cy="90"  r="5" class="dot-irrelevant"/>
  <circle cx="580" cy="75"  r="4" class="dot-irrelevant"/>
  <circle cx="620" cy="130" r="5" class="dot-irrelevant"/>
  <circle cx="95"  cy="160" r="4" class="dot-irrelevant"/>
  <circle cx="145" cy="55"  r="4" class="dot-irrelevant"/>
  <circle cx="560" cy="55"  r="5" class="dot-irrelevant"/>
  <circle cx="630" cy="190" r="4" class="dot-irrelevant"/>
  <circle cx="80"  cy="210" r="5" class="dot-irrelevant"/>
  <circle cx="160" cy="185" r="4" class="dot-irrelevant"/>
  <circle cx="590" cy="175" r="4" class="dot-irrelevant"/>
  <circle cx="520" cy="200" r="4" class="dot-irrelevant"/>
  <circle cx="120" cy="230" r="3" class="dot-irrelevant"/>
  <circle cx="600" cy="220" r="3" class="dot-irrelevant"/>

  <!-- Glow halo around question -->
  <circle cx="340" cy="145" r="55" fill="url(#glow-cyan)"/>

  <!-- Connection lines from question to top-k hits -->
  <g class="connect-lines">
    <line x1="340" y1="145" x2="255" y2="85"  class="connect-line" style="animation-delay:400ms"/>
    <line x1="340" y1="145" x2="420" y2="80"  class="connect-line" style="animation-delay:550ms"/>
    <line x1="340" y1="145" x2="295" y2="178" class="connect-line" style="animation-delay:700ms"/>
    <line x1="340" y1="145" x2="390" y2="172" class="connect-line" style="animation-delay:850ms"/>
    <line x1="340" y1="145" x2="450" y2="145" class="connect-line" style="animation-delay:1000ms"/>
  </g>

  <!-- Top-k hit dots (highlighted, near question) -->
  <circle cx="255" cy="85"  r="9" class="dot-hit dot-hit--glow dot-appear" style="animation-delay:500ms"/>
  <circle cx="420" cy="80"  r="8" class="dot-hit dot-hit--glow dot-appear" style="animation-delay:650ms"/>
  <circle cx="295" cy="178" r="9" class="dot-hit dot-hit--glow dot-appear" style="animation-delay:800ms"/>
  <circle cx="390" cy="172" r="8" class="dot-hit dot-hit--glow dot-appear" style="animation-delay:950ms"/>
  <circle cx="450" cy="145" r="7" class="dot-hit dot-hit--glow dot-appear" style="animation-delay:1100ms"/>

  <!-- Hit labels -->
  <text x="245" y="72" style="fill:#9EBDBD; font-family:'Inter',sans-serif; font-size:9px; text-anchor:middle;">Quelle 1</text>
  <text x="425" y="68" style="fill:#9EBDBD; font-family:'Inter',sans-serif; font-size:9px; text-anchor:middle;">Quelle 2</text>
  <text x="282" y="193" style="fill:#9EBDBD; font-family:'Inter',sans-serif; font-size:9px; text-anchor:middle;">Quelle 3</text>
  <text x="403" y="187" style="fill:#9EBDBD; font-family:'Inter',sans-serif; font-size:9px; text-anchor:middle;">Quelle 4</text>
  <text x="465" y="158" style="fill:#9EBDBD; font-family:'Inter',sans-serif; font-size:9px; text-anchor:start;">Quelle 5</text>

  <!-- Question dot (central) -->
  <circle cx="340" cy="145" r="14" class="dot-question dot-appear" style="animation-delay:200ms"/>
  <text x="340" y="149" style="fill:#00D4D4; font-family:'Inter',sans-serif; font-size:9.5px; font-weight:600; text-anchor:middle; dominant-baseline:middle;">Frage</text>

  <!-- Separator -->
  <line x1="80" y1="242" x2="600" y2="242" stroke="rgba(0,212,212,0.12)" stroke-width="1" stroke-dasharray="5 7"/>
  <text x="340" y="254" class="section-label" text-anchor="middle">Generierung</text>

  <!-- Bottom row: Kontext-Paket → LLM → Antwort -->
  <g class="nn-node nn-node--accent" style="--delay: 1200ms">
    <rect x="75" y="264" width="160" height="58" rx="8"/>
    <text x="155" y="286" class="nn-node__title">Kontext-Paket</text>
    <text x="155" y="303" class="nn-node__sub">Frage + Top-k Passagen</text>
    <text x="155" y="315" class="nn-node__sub">+ Anweisung</text>
  </g>

  <line x1="235" y1="293" x2="270" y2="293" class="nn-arrow-r"
        marker-end="url(#arrow-cyan-r)"/>

  <g class="nn-node nn-node--accent" style="--delay: 1400ms">
    <rect x="275" y="264" width="130" height="58" rx="8"/>
    <text x="340" y="283" class="nn-node__title">Sprachmodell</text>
    <text x="340" y="300" class="nn-node__sub">Antworte nur auf Basis</text>
    <text x="340" y="312" class="nn-node__sub">der gelieferten Quellen</text>
  </g>

  <line x1="405" y1="293" x2="440" y2="293" class="nn-arrow-r nn-arrow-r--green"
        marker-end="url(#arrow-green-r)"/>

  <g class="nn-node nn-node--out" style="--delay: 1600ms">
    <rect x="445" y="264" width="160" height="58" rx="8"/>
    <text x="525" y="283" class="nn-node__title">Antwort mit Quellen</text>
    <text x="525" y="300" class="nn-node__sub">Fundstelle · Seite · Zitat</text>
    <text x="525" y="313" class="nn-node__sub">keine Halluzination</text>
  </g>

  <!-- Reranking label -->
  <text x="340" y="240" style="fill:#4A6868; font-family:'Inter',sans-serif; font-size:9px; text-anchor:middle; font-style:italic;">Reranking → Top-k neu geordnet nach Relevanz</text>
</svg>
