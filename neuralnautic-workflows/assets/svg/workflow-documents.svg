<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" class="nn-workflow-svg"
     role="img" aria-labelledby="docs-title docs-desc">
  <title id="docs-title">Dokumenten-Pipeline mit OCR und Belegankerung</title>
  <desc id="docs-desc">Drei-Band-Pipeline: Eingabe (PDF/Scan), Verarbeitung in EU-Umgebung (OCR, Chunking, Embeddings, pgvector), Ausgabe (belegbare Antwort)</desc>

  <defs>
    <marker id="arrow-cyan-d" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00D4D4" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-green-d" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <style>
    .nn-node rect { fill: #0D2C2C; stroke: rgba(0,212,212,0.25); stroke-width: 1.5; }
    .nn-node--accent rect { fill: #0A2424; stroke: #00D4D4; stroke-width: 1.5; stroke-opacity: 0.6; }
    .nn-node--db rect { fill: rgba(0,212,212,0.07); stroke: #00D4D4; stroke-width: 1.5; }
    .nn-node--out rect { fill: rgba(74,222,128,0.08); stroke: #4ADE80; stroke-width: 1.5; }
    .nn-node__title { fill: #E8F4F4; font-family: 'Inter',sans-serif; font-size: 11.5px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    .nn-node__sub { fill: #6B8989; font-family: 'Inter',sans-serif; font-size: 9.5px; text-anchor: middle; dominant-baseline: middle; }
    .nn-band-label { fill: #4A6868; font-family: 'Inter',sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .nn-arrow-d { stroke: #00D4D4; stroke-width: 1.5; stroke-opacity: 0.7; fill: none; }
    .nn-arrow-d--flow { stroke-dasharray: 7 4; animation: flow-d 1.4s linear infinite; }
    .nn-arrow-d--green { stroke: #4ADE80; stroke-width: 1.5; fill: none; }
    @keyframes flow-d { to { stroke-dashoffset: -11; } }
    .nn-node { opacity: 0; animation: fade-d 0.6s ease-out forwards; animation-delay: var(--delay,0ms); }
    @keyframes fade-d { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @media (prefers-reduced-motion:reduce) { .nn-node,.nn-arrow-d--flow { animation:none !important; opacity:1 !important; } }
  </style>

  <!-- Band background lines -->
  <line x1="80" y1="30" x2="80" y2="330" stroke="rgba(0,212,212,0.08)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Band labels -->
  <text x="14" y="85" class="nn-band-label" transform="rotate(-90, 14, 85)" text-anchor="middle">Eingabe</text>
  <text x="14" y="205" class="nn-band-label" transform="rotate(-90, 14, 205)" text-anchor="middle">Verarbeitung</text>
  <text x="14" y="315" class="nn-band-label" transform="rotate(-90, 14, 315)" text-anchor="middle">Ausgabe</text>

  <!-- Band separator lines -->
  <line x1="80" y1="130" x2="660" y2="130" stroke="rgba(0,212,212,0.1)" stroke-width="1" stroke-dasharray="6 8"/>
  <line x1="80" y1="270" x2="660" y2="270" stroke="rgba(0,212,212,0.1)" stroke-width="1" stroke-dasharray="6 8"/>

  <!-- === BAND 1: Eingabe === -->
  <g class="nn-node" style="--delay: 0ms">
    <rect x="90" y="45" width="110" height="54" rx="8"/>
    <text x="145" y="66" class="nn-node__title">PDF / Scan</text>
    <text x="145" y="84" class="nn-node__sub">Dokumente, Akten</text>
  </g>

  <line x1="200" y1="72" x2="228" y2="72" class="nn-arrow-d nn-arrow-d--flow"
        marker-end="url(#arrow-cyan-d)"/>

  <g class="nn-node nn-node--accent" style="--delay: 150ms">
    <rect x="233" y="45" width="110" height="54" rx="8"/>
    <text x="288" y="64" class="nn-node__title">OCR</text>
    <text x="288" y="82" class="nn-node__sub">Tesseract / Azure</text>
    <text x="288" y="94" class="nn-node__sub">Doc Intelligence</text>
  </g>

  <line x1="343" y1="72" x2="371" y2="72" class="nn-arrow-d nn-arrow-d--flow"
        marker-end="url(#arrow-cyan-d)"/>

  <g class="nn-node nn-node--accent" style="--delay: 300ms">
    <rect x="376" y="45" width="120" height="54" rx="8"/>
    <text x="436" y="64" class="nn-node__title">Chunking</text>
    <text x="436" y="82" class="nn-node__sub">semantische Abschnitte</text>
    <text x="436" y="94" class="nn-node__sub">+ Metadaten</text>
  </g>

  <line x1="496" y1="72" x2="524" y2="72" class="nn-arrow-d nn-arrow-d--flow"
        marker-end="url(#arrow-cyan-d)"/>

  <g class="nn-node nn-node--accent" style="--delay: 450ms">
    <rect x="529" y="45" width="120" height="54" rx="8"/>
    <text x="589" y="64" class="nn-node__title">Embeddings</text>
    <text x="589" y="82" class="nn-node__sub">EU-Modell</text>
    <text x="589" y="94" class="nn-node__sub">numerische Vektoren</text>
  </g>

  <!-- === BAND 2: Verarbeitung === -->

  <!-- Arrow: Embeddings → pgvector -->
  <line x1="589" y1="99" x2="589" y2="148" class="nn-arrow-d"
        marker-end="url(#arrow-cyan-d)"/>
  <line x1="589" y1="148" x2="440" y2="148" class="nn-arrow-d" stroke-opacity="0.5"/>
  <line x1="440" y1="148" x2="440" y2="155" class="nn-arrow-d"
        marker-end="url(#arrow-cyan-d)"/>

  <g class="nn-node nn-node--db" style="--delay: 650ms">
    <rect x="370" y="155" width="140" height="62" rx="8"/>
    <text x="440" y="178" class="nn-node__title">pgvector</text>
    <text x="440" y="196" class="nn-node__sub">Supabase · EU Frankfurt</text>
    <text x="440" y="208" class="nn-node__sub">Row-Level-Security</text>
  </g>

  <!-- Anfrage-Verarbeitung -->
  <g class="nn-node" style="--delay: 800ms">
    <rect x="140" y="155" width="170" height="62" rx="8"/>
    <text x="225" y="175" class="nn-node__title">Anfrage-Verarbeitung</text>
    <text x="225" y="193" class="nn-node__sub">Query → Embedding</text>
    <text x="225" y="206" class="nn-node__sub">Top-k Retrieval + Reranking</text>
  </g>

  <!-- Bidirektionaler Pfeil DB ↔ Anfrage -->
  <line x1="370" y1="186" x2="315" y2="186" class="nn-arrow-d nn-arrow-d--flow"
        marker-end="url(#arrow-cyan-d)"/>
  <line x1="310" y1="198" x2="365" y2="198" class="nn-arrow-d nn-arrow-d--flow"
        marker-end="url(#arrow-cyan-d)"/>

  <!-- === BAND 3: Ausgabe === -->
  <line x1="225" y1="217" x2="225" y2="283" class="nn-arrow-d"
        marker-end="url(#arrow-green-d)"/>

  <g class="nn-node nn-node--out" style="--delay: 1050ms">
    <rect x="100" y="288" width="460" height="54" rx="8"/>
    <text x="330" y="308" class="nn-node__title">Belegbare Antwort mit Seitenangabe und Originalzitat</text>
    <text x="330" y="327" class="nn-node__sub">Dokument · Seite · Absatz · Originalpassage — oder: „Hier reicht der Beleg nicht."</text>
  </g>
</svg>
